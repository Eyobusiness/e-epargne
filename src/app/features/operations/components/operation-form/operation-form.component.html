<form
  class="custom-form"
  [formGroup]="form"
  (ngSubmit)="save()">

  <div class="form-grid">

    <div class="form-group">

      <label for="adherent">
        Adhérent
      </label>

      <input
        id="adherent"
        type="text"
        [value]="getAdherentName(form.get('adherent_id')?.value)"
        readonly>

      <input
        type="hidden"
        formControlName="adherent_id">

    </div>


    <div class="form-group">

      <label for="moyen_operation">
        Moyen de paiement
      </label>

      <select
        id="moyen_operation"
        formControlName="moyen_operation" required>
              
        <option value="">Sélectionner un moyen de paiement</option>

        <option value="CASH">Espèces</option>

        <option value="ORANGE MONEY">Orange Money</option>

        <option value="MTN MONEY">MTN Money</option>

        <option value="WAVE">Wave</option>

      </select>
      @if (
          form.controls.moyen_operation.invalid &&
          form.controls.moyen_operation.touched
        ) {

          <small class="text-danger">
            Le moyen de paiement est obligatoire
          </small>

        }

    </div>

    <div class="form-group">

      <label for="type_operation">
        Type opération
      </label>

      <input
        id="type_operation"
        type="text"
        [value]="form.get('type_operation')?.value === 'DEPOT' ? 'Dépôt' : (form.get('type_operation')?.value === 'RETRAIT' ? 'Retrait' : form.get('type_operation')?.value)"
        readonly>

      <input
        type="hidden"
        formControlName="type_operation">

    </div>

    <div class="form-group">

      <label for="montant">
        Montant
      </label>

      <input
        id="montant"
        type="number"
        formControlName="montant" readonly>

    </div>

    <div class="form-group">

      <label for="date_operation">
        Date opération
      </label>

      <input
        id="date_operation"
        type="date"
        formControlName="date_operation">

    </div>

    <!-- <div class="form-group full-width">

      <label for="motif">
        Motif
      </label>

      <input
        id="motif"
        type="text"
        formControlName="motif">

    </div> -->

    <!-- <div class="form-group full-width">

      <label for="description">
        Description
      </label>

      <textarea
        id="description"
        rows="4"
        formControlName="description">
      </textarea>

    </div> -->

  </div>

  <input
    type="hidden"
    formControlName="cotisation_adherent_id">

  <div class="form-actions">

    <button
      type="button"
      class="btn btn-cancel"
      (click)="close()">

      Annuler

    </button>

    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="form.invalid || isLoading()">

      <i class="bi bi-cash-stack"></i>

      Payer

    </button>

  </div>

</form>
