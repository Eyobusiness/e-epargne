<div class="workflow-page">
  <div class="page-header">
    <app-page-header
      title="Configuration Workflow"
      description="Gestion des workflows, etats et actions">
    </app-page-header>
  </div>

  <div class="workflow-tabs">
    <button
      [class.active]="activeTab() === 'workflow'"
      (click)="setTab('workflow')">
      Workflows
    </button>

    <button
      [class.active]="activeTab() === 'state'"
      (click)="setTab('state')">
      Etats
    </button>
  </div>

  @if (activeTab() === 'workflow') {
    <app-workflow-table
      [workflows]="workflows()"
      (create)="openWorkflowModal()"
      (edit)="openEditWorkflowModal($event)"
      (remove)="openDeleteWorkflowDialog($event)"
      (configure)="configureWorkflow($event)">
    </app-workflow-table>
  }

  @if (activeTab() === 'state') {
    <app-workflow-states
      [states]="states()"
      (create)="openStateModal()"
      (edit)="openEditStateModal($event)"
      (remove)="openDeleteStateDialog($event)">
    </app-workflow-states>
  }


</div>

<app-modal
  [isOpen]="isActionModalOpen()"
  title="Action Workflow"
  description="Ajouter ou modifier une action"
  width="800px"
  (close)="closeActionModal()">
  <app-workflow-action-form
    [action]="selectedAction()"
    [workflows]="workflows()"
    [states]="states()"
    [profiles]="profiles()"
    [endpoints]="endpoints()"
    [actionsList]="actions()"
    [isLoading]="isActionLoading()"
    (submitForm)="saveAction($event)"
    (cancel)="closeActionModal()">
  </app-workflow-action-form>
</app-modal>

<app-confirm-dialog
  [isOpen]="isDeleteActionOpen()"
  [isLoading]="isDeleteLoading()"
  title="Supprimer action"
  message="Voulez-vous supprimer cette action ?"
  (confirm)="deleteAction()"
  (cancel)="closeDeleteActionDialog()">
</app-confirm-dialog>

<app-modal
  [isOpen]="isStateModalOpen()"
  title="Etat Workflow"
  description="Ajouter ou modifier un etat"
  width="700px"
  (close)="closeStateModal()">
  <app-workflow-state-form
    [state]="selectedState()"
    [states]="states()"
    [isLoading]="isStateLoading()"
    (submitForm)="saveState($event)"
    (cancel)="closeStateModal()">
  </app-workflow-state-form>
</app-modal>

<app-confirm-dialog
  [isOpen]="isDeleteStateOpen()"
  [isLoading]="isDeleteStateLoading()"
  title="Supprimer etat"
  message="Voulez-vous supprimer cet etat ?"
  (confirm)="deleteState()"
  (cancel)="closeDeleteStateDialog()">
</app-confirm-dialog>

<app-modal
  [isOpen]="isWorkflowModalOpen()"
  title="Workflow"
  description="Ajouter ou modifier un workflow"
  width="700px"
  (close)="closeWorkflowModal()">
  <app-workflow-form
    [workflow]="selectedWorkflow()"
    [endpoints]="endpoints()"
    [isLoading]="isWorkflowLoading()"
    (submitForm)="saveWorkflow($event)"
    (cancel)="closeWorkflowModal()">
  </app-workflow-form>
</app-modal>

<app-confirm-dialog
  [isOpen]="isDeleteWorkflowOpen()"
  [isLoading]="isDeleteWorkflowLoading()"
  title="Supprimer workflow"
  message="Voulez-vous supprimer ce workflow ?"
  (confirm)="deleteWorkflow()"
  (cancel)="closeDeleteWorkflowDialog()">
</app-confirm-dialog>
