<div class="table-wrapper">

  @if (states().length > 0) {

    <table class="custom-table">

      <thead>

        <tr>
          <th>#</th>
          <th>Nom</th>
          <th>Before Step</th>
          <th>Description</th>
          <th>Parent</th>
          <th class="text-center">Actions</th>
        </tr>

      </thead>

      <tbody>

        @for (
          state of states();
          track trackById($index, state)
        ) {

          <tr>

            <td>{{ $index + 1 }}</td>

            <td>
              <span class="state-name">
                {{ state.name }}
              </span>
            </td>

            <td>{{ state.beforeStep }}</td>

            <td>
              {{ state.description || '-' }}
            </td>

            <td>
              {{ state.parent || '-' }}
            </td>

            <td class="actions">

              <button
                type="button"
                class="btn-action btn-edit"
                title="Modifier"
                (click)="onEdit(state)">

                <i class="bi bi-pencil-square"></i>

              </button>

              <button
                type="button"
                class="btn-action btn-delete"
                title="Supprimer"
                (click)="onDelete(state)">

                <i class="bi bi-trash"></i>

              </button>

            </td>

          </tr>

        }

      </tbody>

    </table>

  } @else {

    <div class="empty-state">

      <i class="bi bi-diagram-3"></i>

      <p>Aucun état enregistré</p>

    </div>

  }

</div>
