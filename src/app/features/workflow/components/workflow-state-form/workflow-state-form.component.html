<form
  [formGroup]="form"
  (ngSubmit)="save()">

  <div class="row g-3">

    <div class="col-md-6">

      <label
        for="nom"
        class="form-label">

        Nom

      </label>

      <input
        id="nom"
        type="text"
        class="form-control"
        formControlName="name">

      @if (
        f.name.touched &&
        f.name.invalid
      ) {

        <small class="text-danger">

          Le nom est obligatoire.

        </small>

      }

    </div>

    <div class="col-md-6">

      <label
        for="beforeStep"
        class="form-label">

        Etat précédent

      </label>

      <input
        id="beforeStep"
        class="form-control"
        formControlName="beforeStep">
    </div>

    <div class="col-md-12">

      <label
        for="description"
        class="form-label">

        Description

      </label>

      <textarea
        id="description"
        rows="4"
        class="form-control"
        formControlName="description">
      </textarea>

    </div>

  </div>

  <div
    class="d-flex justify-content-end gap-2 mt-4">

    <button
      type="button"
      class="btn btn-light"
      (click)="onCancel()">

      Annuler

    </button>

    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="isLoading()">

      @if (isLoading()) {

        <span
          class="spinner-border spinner-border-sm me-2">
        </span>

        Enregistrement...

      } @else {

        Enregistrer

      }

    </button>

  </div>

</form>
