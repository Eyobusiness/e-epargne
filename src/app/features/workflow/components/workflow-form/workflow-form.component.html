<form
  [formGroup]="form"
  (ngSubmit)="onSubmit()">

  <div class="row g-3">

    <div class="col-12">

      <label for="libelle" class="form-label">
        Libellé
      </label>

      <input id="libelle"
        type="text"
        class="form-control"
        formControlName="label">

    </div>

    <div class="col-12">

      <label for="endpoint" class="form-label">
        Endpoint
      </label>

      <select id="endpoint"
        class="form-select"
        formControlName="endpoint">

        <option value="">Sélectionner un endpoint</option>

        @for (ep of endpoints(); track ep.id) {
          <option [value]="ep.valeur">{{ ep.libelle }} — {{ ep.valeur }}</option>
        }

        @if (endpoints().length === 0) {
          <option value="" disabled>Aucun endpoint disponible (créez-en dans Paramètres)</option>
        }

      </select>

    </div>

    <div class="col-12">

      <label for="description" class="form-label">
        Description
      </label>

      <textarea id="description"
        rows="4"
        class="form-control"
        formControlName="description">
      </textarea>

    </div>

  </div>

  <div class="d-flex justify-content-end gap-2 mt-4">

    <button
      type="button"
      class="btn btn-light"
      [disabled]="isLoading()"
      (click)="onClose()">

      Annuler

    </button>

    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="isLoading()">

      {{ isLoading() ? 'Enregistrement...' : 'Enregistrer' }}

    </button>

  </div>

</form>
