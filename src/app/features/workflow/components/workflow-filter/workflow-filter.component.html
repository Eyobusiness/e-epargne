<div class="filter-container">

  <div class="filter-grid">

    <div class="form-group">

      <label>
        Recherche
      </label>

      <input
        type="text"
        placeholder="Label ou endpoint..."
        [ngModel]="search()"
        (ngModelChange)="search.set($event)">

    </div>

    <div class="form-group">

      <label for="status">
        Statut
      </label>

      <select id="status" title="selectionner le statut "
        [ngModel]="status()"
        (ngModelChange)="status.set($event)">

        <option value="">
          Tous
        </option>

        <option value="200">
          Actif
        </option>

        <option value="100">
          En attente
        </option>

        <option value="300">
          Désactivé
        </option>

      </select>

    </div>

  </div>

  <div class="filter-actions">

    <button
      class="btn btn-secondary"
      (click)="resetFilters()">

      Réinitialiser

    </button>

    <button
      class="btn btn-primary"
      (click)="applyFilters()">

      Filtrer

    </button>

  </div>

</div>
