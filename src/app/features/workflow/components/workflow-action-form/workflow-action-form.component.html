<form
  [formGroup]="form"
  (ngSubmit)="save()">

  <div class="row g-3">

    <!-- WORKFLOW -->

    <div class="col-md-12">

      <label
        for="workflow"
        class="form-label">

        Workflow

      </label>

      <select
        id="workflow"
        class="form-select"
        formControlName="idWorkflow">

        <option value="">
          Sélectionner
        </option>

        @for (
          item of workflows();
          track item.id
        ) {

          <option [value]="item.id">

            {{ item.label }}

          </option>

        }

      </select>

    </div>

    <!-- PROFILS -->

    <div class="col-md-12">

      <label
        class="form-label" for="profil">

        Profils autorisés

      </label>

      <div class="profile-list">

        @for (
          profile of profiles();
          track profile.id
        ) {

          <div class="profile-item">

            <input id="profil"
              [id]="'profile-' + profile.id"
              type="checkbox"

              [checked]="
                isChecked(profile.id!)
              "

              (change)="
                toggleProfile(
                  profile.id!,
                  $any($event.target).checked
                )
              ">

            <label
              [for]="'profile-' + profile.id">

              {{ profile.libelle }}

            </label>

          </div>

        }

        @if (profiles().length === 0) {

          <p class="text-muted mb-0">
            Aucun profil disponible.
          </p>

        }

      </div>

    </div>

    <!-- ETAT -->

    <div class="col-md-6">

      <label
        for="etat"
        class="form-label">

        Etat

      </label>

      <select
        id="etat"
        class="form-select"
        formControlName="stepId">

        <option value="">
          Sélectionner
        </option>

        @for (
          item of filteredStates();
          track item.id
        ) {

          <option
            [value]="item.id">

            {{ item.name }}

          </option>

        }

      </select>

    </div>

    <!-- ENDPOINT -->

    <div class="col-md-6">

      <label
        for="endpoint"
        class="form-label">

        Endpoint

      </label>

      <select
        id="endpoint"
        class="form-select"
        formControlName="endpoint">

        <option value="">
          Sélectionner
        </option>

        @for (
          endpoint of endpoints();
          track endpoint.id
        ) {

          <option
            [value]="endpoint.valeur">

            {{ endpoint.libelle }}

          </option>

        }

        @if (endpoints().length === 0) {

          <option
            value=""
            disabled>

            Aucun endpoint disponible

          </option>

        }

      </select>

    </div>

    <!-- ETAT PRECEDENT -->

    <div class="col-md-6">

      <label
        for="bs"
        class="form-label">

        Etat précédent

      </label>

      <input
        id="bs"
        class="form-control"
        formControlName="beforeStep">

    </div>

    <!-- ORDRE -->

    <div class="col-md-6">

      <label
        for="ordre"
        class="form-label">

        Ordre

      </label>

      <select
        id="ordre"
        class="form-select"
        formControlName="stateOrder">

        @for (
          item of [1,2,3,4];
          track item
        ) {

          <option
            [value]="item">

            {{ item }}

          </option>

        }

      </select>

    </div>

    <!-- NOTIFICATION -->

    <!-- <div class="col-md-6">

      <label
        for="notif"
        class="form-label">

        Notification

      </label>

      <input
        id="notif"
        class="form-control"
        formControlName="notification">

    </div> -->

    <!-- NEXT FIELD -->

    <!-- <div class="col-md-6">

      <label
        for="nf"
        class="form-label">

        Next Field

      </label>

      <input
        id="nf"
        class="form-control"
        formControlName="nextField">

    </div> -->

  </div>

  <div
    class="d-flex justify-content-end gap-2 mt-4">

    <button
      type="button"
      class="btn btn-light"
      (click)="onCancel()">

      Annuler

    </button>

    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="isLoading()">

      {{
        isLoading()
          ? 'Enregistrement...'
          : 'Enregistrer'
      }}

    </button>

  </div>

</form>
