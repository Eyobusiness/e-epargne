<div class="table-wrapper">

  <table class="custom-table">

    <thead>

      <tr>

        <th>#</th>

        <th>Libellé</th>

        <th>Code</th>

        <th>Menus</th>

        <th>Permission</th>

        <th>Actions</th>

      </tr>

    </thead>

    <tbody>

      @for (
        item of profiles();
        track trackById($index, item)
      ) {

        <tr>

          <td>
            {{ $index + 1 }}
          </td>

          <td>

            <strong>
              {{ item.libelle }}
            </strong>

          </td>

          <td>

            <span class="code-badge">
              {{ item.code || '--' }}
            </span>

          </td>

          <td>

            <span class="menu-count">

              {{
                item.profilMenus?.length || 0
              }}

            </span>

          </td>

          <td>

            <span class="permission-badge">

              {{
                item.permission || '--'
              }}

            </span>

          </td>

          <td class="actions">

            <button
              class="btn-action btn-edit"
              title="Modifier"
              (click)="onEdit(item)">

              <i class="bi bi-pencil-square"></i>

            </button>

            <button
              class="btn-action btn-delete"
              title="Supprimer"
              (click)="onDelete(item)">

              <i class="bi bi-trash"></i>

            </button>

          </td>

        </tr>

      }

    </tbody>

  </table>

</div>
