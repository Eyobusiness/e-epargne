<!-- pages/profils/profils.component.html -->

<app-page-header
  title="Profils"
  description="Gestion des profils et permissions"
  buttonText="Nouveau profil"
  icon="bi bi-plus-lg"
  (action)="openCreateModal()">
</app-page-header>

<div class="page-content">

  <div class="actions-bar">

    <button
      class="btn-admin"
      [disabled]="isAdminLoading() || isLoading()"
      (click)="generateAdmin()">

      @if (isAdminLoading()) {
        <span class="loading-spinner"></span>
      } @else {
        <i class="bi bi-shield-check"></i>
      }

      {{ isAdminLoading() ? 'Generation...' : 'Generer profil admin' }}

    </button>

  </div>

  @if (isPageLoading()) {

    <div class="loading-state">
      Chargement...
    </div>

  }

  @if (!isPageLoading()) {

    @if (!isEmpty()) {

      <app-profil-table
        [profils]="profils()"
        (edit)="openEditModal($event)"
        (delete)="openDeleteDialog($event)"
        (detail)="viewDetail($event)">
      </app-profil-table>

    }

    @if (isEmpty()) {

      <app-empty-state
        title="Aucun profil"
        description="Aucun profil disponible actuellement">
      </app-empty-state>

    }

  }

</div>

<app-modal
  [isOpen]="isModalOpen()"
  title="Profil"
  description="Gestion des permissions et menus"
  width="750px"
  (close)="closeModal()">

  <app-profil-form
    [profil]="selected()"
    [menus]="menus()"
    [isLoading]="isLoading()"
    (submitForm)="save($event)"
    (cancel)="closeModal()">
  </app-profil-form>

</app-modal>

<app-confirm-dialog
  [isOpen]="isDeleteOpen()"
  [isLoading]="isDeleteLoading()"
  title="Supprimer profil"
  message="Voulez-vous supprimer ce profil ?"
  (confirm)="delete()"
  (cancel)="closeDeleteDialog()">
</app-confirm-dialog>
