<form class="affectation-form" novalidate (ngSubmit)="onSubmit()">
  <div class="form-grid">
    <app-select
      label="Plafond à appliquer"
      placeholder="Choisir un plafond"
      [options]="plafondOptions()"
      [ngModel]="selectedPlafondId()"
      (ngModelChange)="selectedPlafondId.set($event)"
      [error]="getError('plafond_id')"
      name="plafond_id">
    </app-select>

    <app-select
      label="Agent Collecteur"
      placeholder="Choisir un agent"
      [options]="agentOptions()"
      [ngModel]="selectedAgentId()"
      (ngModelChange)="selectedAgentId.set($event)"
      [error]="getError('agent_id')"
      name="agent_id">
    </app-select>
  </div>

  <div class="form-actions">
    <app-button
      type="button"
      label="Annuler"
      variant="secondary"
      [disabled]="isLoading()"
      (clicked)="onCancel()">
    </app-button>

    <app-button
      type="submit"
      label="Enregistrer"
      [loading]="isLoading()">
    </app-button>
  </div>
</form>
