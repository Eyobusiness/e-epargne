<form class="affectation-form" novalidate (ngSubmit)="onSubmit()">
  <div class="form-grid">
    <div class="target-type-selector">
      <label class="form-label-custom">Type d'affectation</label>
      <div class="toggle-buttons">
        <button
          type="button"
          class="toggle-btn"
          [class.active]="targetType() === 'agent'"
          (click)="setTargetType('agent')">
          <i class="bi bi-person"></i> Agent Collecteur
        </button>
        <button
          type="button"
          class="toggle-btn"
          [class.active]="targetType() === 'profil'"
          (click)="setTargetType('profil')">
          <i class="bi bi-shield-lock"></i> Profil
        </button>
      </div>
    </div>

    <app-select
      label="Plafond à appliquer"
      placeholder="Choisir un plafond"
      [options]="plafondOptions()"
      [ngModel]="selectedPlafondId()"
      (ngModelChange)="selectedPlafondId.set($event)"
      [error]="getError('plafond_id')"
      name="plafond_id">
    </app-select>

    @if (targetType() === 'agent') {
      <app-select
        label="Agent Collecteur"
        placeholder="Choisir un agent"
        [options]="agentOptions()"
        [ngModel]="selectedAgentId()"
        (ngModelChange)="selectedAgentId.set($event)"
        [error]="getError('agent_id')"
        name="agent_id">
      </app-select>
    }

    @if (targetType() === 'profil') {
      <app-select
        label="Profil Utilisateur"
        placeholder="Choisir un profil"
        [options]="profilOptions()"
        [ngModel]="selectedProfilId()"
        (ngModelChange)="selectedProfilId.set($event)"
        [error]="getError('profil_id')"
        name="profil_id">
      </app-select>
    }
  </div>

  <div class="form-actions">
    <app-button
      type="button"
      label="Annuler"
      variant="secondary"
      [disabled]="isLoading()"
      (clicked)="onCancel()">
    </app-button>

    <app-button
      type="submit"
      label="Enregistrer"
      [loading]="isLoading()">
    </app-button>
  </div>
</form>
