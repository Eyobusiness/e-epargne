<div class="row g-3">

  <div class="col-12 col-sm-6 col-xl-4">
    <div class="stat-card stat-card--blue h-100">
      <div class="stat-icon stat-icon--blue">
        <i class="bi bi-cash-stack"></i>
      </div>

      <div class="stat-content">
        <span>Total cotisations</span>
        <h5>{{ totalCotisations() }}</h5>
      </div>
    </div>
  </div>

  <div class="col-12 col-sm-6 col-xl-4">
    <div class="stat-card stat-card--green h-100">
      <div class="stat-icon stat-icon--green">
        <i class="bi bi-wallet2"></i>
      </div>

      <div class="stat-content">
        <span>Montant total</span>
        <h5>{{ totalMontant() | formatMontant }} FCFA</h5>
      </div>
    </div>
  </div>

  <div class="col-12 col-sm-6 col-xl-4">
    <div class="stat-card stat-card--emerald h-100">
      <div class="stat-icon stat-icon--emerald">
        <i class="bi bi-check-circle"></i>
      </div>

      <div class="stat-content">
        <span>Actives</span>
        <h5>{{ totalActives() }}</h5>
      </div>
    </div>
  </div>

</div>
