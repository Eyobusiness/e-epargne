<div class="filter-container">

  <div class="row g-3 align-items-end">

    <div class="col-lg-3 col-md-6">
      <label for="date_debut" class="form-label">
        Date début
      </label>

      <input
        id="date_debut"
        type="date"
        class="form-control"
        [ngModel]="startDate()"
        (ngModelChange)="startDate.set($event)">
    </div>

    <div class="col-lg-3 col-md-6">
      <label for="date_fin" class="form-label">
        Date fin
      </label>

      <input
        id="date_fin"
        type="date"
        class="form-control"
        [ngModel]="endDate()"
        (ngModelChange)="endDate.set($event)">
    </div>

    <div class="col-lg-3 col-md-6">
      <label for="adherent" class="form-label">
        Adhérent
      </label>

      <select
        id="adherent"
        class="form-select"
        [ngModel]="adherentId()"
        (ngModelChange)="adherentId.set($event)">

        <option value="">Tous</option>

        @for (item of adherents(); track item.id) {
          <option [value]="item.id">
            {{ item.name }}
          </option>
        }

      </select>
    </div>

    <div class="col-lg-3 col-md-6">
      <label for="status" class="form-label">
        Statut
      </label>

      <select
        id="status"
        class="form-select"
        [ngModel]="status()"
        (ngModelChange)="status.set($event)">

        <option value="">Tous</option>
        <option value="200">Actif</option>
        <option value="100">En attente</option>
        <option value="0">Inactif</option>

      </select>
    </div>

  </div>

  <div class="d-flex justify-content-end gap-2 mt-4">

    <button
      class="btn btn-outline-secondary"
      (click)="resetFilters()">

      Réinitialiser

    </button>

    <button
      class="btn btn-primary"
      (click)="applyFilters()">

      Filtrer

    </button>

  </div>

</div>
