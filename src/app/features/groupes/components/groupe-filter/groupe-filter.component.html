<!-- components/groupe-filter/groupe-filter.component.html -->

<div class="filter-container">
  <div class="row align-items-end g-3 w-100 m-0">

    <div class="col-12 col-md-6 col-lg-7">
      <label class="filter-label">Recherche</label>
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input
          type="text"
          placeholder="Nom groupe..."
          [ngModel]="search()"
          (ngModelChange)="search.set($event)">
      </div>
    </div>

    <div class="col-12 col-md-3 col-lg-2">
      <label class="filter-label">Statut</label>
      <select
        class="form-select"
        title="Selectionner un statut"
        [ngModel]="status()"
        (ngModelChange)="status.set($event)">
        <option value="200">Actif</option>
        <option value="inactif">Inactif</option>
      </select>
    </div>

    <div class="col-12 col-md-3 col-lg-3 d-flex gap-2">
      <button
        type="button"
        class="btn btn-primary flex-grow-1"
        (click)="applyFilters()">
        <i class="bi bi-funnel"></i>
        Filtrer
      </button>
      <button
        type="button"
        class="btn btn-outline-secondary px-2"
        (click)="resetFilters()"
        title="Réinitialiser">
        <i class="bi bi-arrow-counterclockwise"></i>
      </button>
    </div>

  </div>
</div>
