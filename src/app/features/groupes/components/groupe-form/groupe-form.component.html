<!-- components/groupe-form/groupe-form.component.html -->

<form
  class="groupe-form"
  [formGroup]="form"
  (ngSubmit)="save()">

  <div class="form-grid">

    <div class="form-group">

      <label>
        Nom du groupe
      </label>

      <input
        type="text"
        formControlName="name"
        placeholder="Nom du groupe"
        [class.invalid]="
          hasError('name')
        ">

      @if (hasError('name')) {

        <small class="error-text">
          Le nom est obligatoire
        </small>

      }

    </div>


    <div class="form-group">

      <label>
        Montant minimum
      </label>

      <input
        type="number"
        formControlName="montant_min"
        placeholder="0"
        [class.invalid]="
          hasError('montant_min')
        ">

      @if (hasError('montant_min')) {

        <small class="error-text">
          Montant minimum invalide
        </small>

      }

    </div>
    <div class="form-group">

      <label>
        Montant maximum
      </label>

      <input
        type="number"
        formControlName="montant_max"
        placeholder="0"
        [class.invalid]="
          hasError('montant_max')
        ">

      @if (hasError('montant_max')) {

        <small class="error-text">
          Montant maximum invalide
        </small>

      }

    </div>

    <div class="form-group full-width">

      <label>
        Description
      </label>

      <textarea
        rows="5"
        formControlName="description"
        placeholder="Description groupe">
      </textarea>

    </div>

  </div>

  <div class="form-actions">

    <button
      type="button"
      class="btn btn-cancel"
      [disabled]="isLoading()"
      (click)="close()">

      Annuler

    </button>

    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="isLoading()">

      @if (isLoading()) {
        <span class="loading-spinner"></span>
      }

      {{
        isEditMode()
          ? 'Modifier'
          : 'Enregistrer'
      }}

    </button>

  </div>

</form>
