<div class="filter-container">
  <div class="filter-grid">
    <div class="form-group">
      <label>Recherche</label>
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input
          type="text"
          placeholder="Nom, email, telephone, matricule..."
          [ngModel]="search()"
          (ngModelChange)="search.set($event)">
      </div>
    </div>

    <div class="form-group">
      <label>Statut</label>
      <select title="Statut" [ngModel]="status()" (ngModelChange)="status.set($event)">
        <option value="">Tous</option>
        <option value="200">Actif</option>
        <option value="0">Inactif</option>
      </select>
    </div>
  </div>

  <div class="filter-actions">
    <button type="button" class="btn btn-reset" (click)="resetFilters()">Reinitialiser</button>
    <button type="button" class="btn btn-primary" (click)="applyFilters()">Filtrer</button>
  </div>
</div>
