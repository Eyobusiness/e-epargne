<div class="filter-container">

  <div class="filter-grid">

    <div class="form-group">

      <label for="search">
        Recherche
      </label>

      <div class="search-box">

        <i class="bi bi-search"></i>

        <input
          id="search"
          type="text"
          placeholder="Nom, email, telephone..."
          [ngModel]="search()"
          (ngModelChange)="search.set($event)">

      </div>

    </div>

    <div class="form-group">

      <label for="statut">
        Statut
      </label>

      <select
        id="statut"
        [ngModel]="status()"
        (ngModelChange)="status.set($event)">

        <option value="">
          Tous
        </option>

        <option value="200">
          Actif
        </option>

        <option value="300">
          Inactif
        </option>

      </select>

    </div>

  </div>

  <div class="filter-actions">

    <button
      type="button"
      class="btn btn-secondary"
      (click)="resetFilters()">

      <i class="bi bi-arrow-clockwise"></i>

      Réinitialiser

    </button>

    <button
      type="button"
      class="btn btn-primary"
      (click)="applyFilters()">

      <i class="bi bi-funnel"></i>

      Filtrer

    </button>

  </div>

</div>
