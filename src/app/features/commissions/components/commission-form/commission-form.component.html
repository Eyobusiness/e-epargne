<form class="commission-form" novalidate (ngSubmit)="onSubmit()">
  <div class="form-grid">
    <div class="form-row-2">
      <app-select
        label="Type d'opération *"
        placeholder="Type d'opération"
        [options]="operationOptions()"
        [ngModel]="form().type_operation"
        (ngModelChange)="updateField('type_operation', $event)"
        (blurred)="markAsTouched('type_operation')"
        [error]="getError('type_operation')"
        name="type_operation">
      </app-select>

      <app-select
        label="Mode de commission *"
        placeholder="Mode de commission"
        [options]="modeOptions()"
        [ngModel]="form().mode_commission"
        (ngModelChange)="updateField('mode_commission', $event)"
        (blurred)="markAsTouched('mode_commission')"
        [error]="getError('mode_commission')"
        name="mode_commission">
      </app-select>
    </div>

    <div class="form-row-2">
      <app-input
        type="number"
        label="Valeur de la commission *"
        [placeholder]="form().mode_commission === 'PERCENT' ? 'Ex: 2.5' : 'Ex: 1000'"
        [ngModel]="form().valeur"
        (ngModelChange)="updateField('valeur', $event)"
        (blurred)="markAsTouched('valeur')"
        [error]="getError('valeur')"
        name="valeur">
      </app-input>

      <app-input
        label="Libellé (Optionnel)"
        placeholder="Ex: Retrait standard"
        [ngModel]="form().libelle"
        (ngModelChange)="updateField('libelle', $event)"
        (blurred)="markAsTouched('libelle')"
        [error]="getError('libelle')"
        name="libelle">
      </app-input>
    </div>

    @if (form().mode_commission === 'FIXED') {
      <div class="form-check form-switch my-1 px-4">
        <input 
          class="form-check-input" 
          type="checkbox" 
          role="switch"
          id="toggleInterval"
          [checked]="showIntervalInput()"
          (change)="toggleInterval($event)">
        <label class="form-check-label text-muted small" for="toggleInterval">
          Définir des limites de montant pour cette commission fixe (Optionnel)
        </label>
      </div>
    }

    @if (isIntervalVisible()) {
      <div class="form-row-2">
        <app-input
          type="number"
          [label]="form().mode_commission === 'PERCENT' ? 'Montant minimum *' : 'Montant minimum (Optionnel)'"
          placeholder="Ex: 5000"
          [ngModel]="form().montant_min"
          (ngModelChange)="updateField('montant_min', $event)"
          (blurred)="markAsTouched('montant_min')"
          [error]="getError('montant_min')"
          name="montant_min">
        </app-input>

        <app-input
          type="number"
          [label]="form().mode_commission === 'PERCENT' ? 'Montant maximum *' : 'Montant maximum (Optionnel)'"
          placeholder="Ex: 50000"
          [ngModel]="form().montant_max"
          (ngModelChange)="updateField('montant_max', $event)"
          (blurred)="markAsTouched('montant_max')"
          [error]="getError('montant_max')"
          name="montant_max">
        </app-input>
      </div>
    }
  </div>

  <div class="form-actions">
    <app-button
      type="button"
      label="Annuler"
      variant="secondary"
      [disabled]="isLoading()"
      (clicked)="onCancel()">
    </app-button>

    <app-button
      type="submit"
      label="Enregistrer"
      [loading]="isLoading()">
    </app-button>
  </div>
</form>
