<div class="filter-container">
  <div class="row align-items-end g-3 w-100 m-0">

    <div class="col-12 col-md-3">
      <label class="filter-label">Recherche</label>
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input
          type="text"
          placeholder="Libellé..."
          [ngModel]="search()"
          (ngModelChange)="search.set($event)">
      </div>
    </div>

    <div class="col-12 col-md-2">
      <label class="filter-label">Opération</label>
      <select
        class="form-select"
        title="Type d'opération"
        [ngModel]="type_operation()"
        (ngModelChange)="type_operation.set($event)">
        <option value="">Tous</option>
        <option value="DEPOT">Dépôt</option>
        <option value="RETRAIT">Retrait</option>
      </select>
    </div>

    <div class="col-12 col-md-3">
      <label class="filter-label">Groupe</label>
      <select
        class="form-select"
        title="Groupe de cotisation"
        [ngModel]="groupe_cotisation_id()"
        (ngModelChange)="groupe_cotisation_id.set($event)">
        <option value="">Tous les groupes</option>
        @for (g of groupes(); track g.id || $index) {
          <option [value]="g.id">{{ g.name }}</option>
        }
      </select>
    </div>

    <div class="col-12 col-md-2">
      <label class="filter-label">Statut</label>
      <select
        class="form-select"
        title="Sélectionner un statut"
        [ngModel]="status()"
        (ngModelChange)="status.set($event)">
        <option value="">Tous</option>
        <option value="200">Actif</option>
        <option value="300">Inactif</option>
      </select>
    </div>

    <div class="col-12 col-md-2 d-flex gap-2">
      <button
        type="button"
        class="btn btn-primary flex-grow-1"
        (click)="applyFilters()">
        <i class="bi bi-funnel"></i>
        Filtrer
      </button>
      <button
        type="button"
        class="btn btn-outline-secondary px-2"
        (click)="resetFilters()"
        title="Réinitialiser">
        <i class="bi bi-arrow-counterclockwise"></i>
      </button>
    </div>

  </div>
</div>
