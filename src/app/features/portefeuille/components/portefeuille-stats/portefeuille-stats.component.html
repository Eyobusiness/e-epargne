@if (isLoading()) {
  <div class="stats-grid stats-grid--4">
    @for (item of [1, 2, 3, 4]; track item) {
      <div class="stat-card skeleton-card"></div>
    }
  </div>
} @else {
  <div class="stats-grid stats-grid--4">
    <div class="stat-card stat-card--blue">
      <div class="stat-icon stat-icon--blue">
        <i class="bi bi-wallet2"></i>
      </div>
      <div class="stat-content">
        <span>Solde actuel</span>
        <h5>{{ solde() | formatMontant }} FCFA</h5>
      </div>
    </div>

    <div class="stat-card stat-card--green">
      <div class="stat-icon stat-icon--green">
        <i class="bi bi-arrow-down-circle"></i>
      </div>
      <div class="stat-content">
        <span>Total entrées</span>
        <h5>{{ totalEntrees() | formatMontant }} FCFA</h5>
      </div>
    </div>

    <div class="stat-card stat-card--red">
      <div class="stat-icon stat-icon--red">
        <i class="bi bi-arrow-up-circle"></i>
      </div>
      <div class="stat-content">
        <span>Total Retrait</span>
        <h5>{{ totalSorties() | formatMontant }} FCFA</h5>
      </div>
    </div>

    <div class="stat-card stat-card--emerald">
      <div class="stat-icon stat-icon--emerald">
        <i class="bi bi-clock-history"></i>
      </div>
      <div class="stat-content">
        <span>Dépôts en attente</span>
        <h5>{{ totalCotisations() | formatMontant }} FCFA</h5>
      </div>
    </div>
  </div>
}
