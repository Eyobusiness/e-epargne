<div class="filter-card">

  <div class="filter-header">

    <h3>
      Filtres
    </h3>

  </div>

  <div class="filter-grid">

    <div class="form-group">

      <label for="date_debut">
        Date début
      </label>

      <input id="date_debut"
        type="date"
        [(ngModel)]="filter().startDate">

    </div>

    <div class="form-group">

      <label for="date_fin">
        Date fin
      </label>

      <input id='date_fin'
        type="date"
        [(ngModel)]="filter().endDate">

    </div>

  </div>

  <div class="filter-actions">

    <button
      type="button"
      class="btn btn-outline"
      (click)="onReset()">

      Réinitialiser

    </button>

    <button
      type="button"
      class="btn btn-primary"
      (click)="onApply()">

      Filtrer

    </button>

  </div>

</div>
