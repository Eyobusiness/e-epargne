<div class="page-header">

  <div class="page-header-content">

    <h1>
      {{ title() }}
    </h1>

    <p>
      {{ description() }}
    </p>

  </div>

  <div class="page-header-actions">
    @if (secondaryButtonText()) {

      <button
        type="button"
        class="page-header-btn btn-secondary"
        (click)="onSecondaryAction()">

        <i [class]="secondaryIcon()"></i>

        <span>
          {{ secondaryButtonText() }}
        </span>

      </button>

    }

    @if (buttonText()) {

      <button
        type="button"
        class="page-header-btn btn-accent"
        (click)="onAction()">

        <i [class]="icon()"></i>

        <span>
          {{ buttonText() }}
        </span>

      </button>

    }
  </div>

</div>
