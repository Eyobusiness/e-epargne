<div class="field">
  @if (label()) {
    <label class="field__label" [for]="id()">{{ label() }}</label>
  }

  <textarea title="saisir la texte"
    class="field__textarea"
    [id]="id()"
    [rows]="rows()"
    [placeholder]="placeholder()"
    [value]="value()"
    [disabled]="isDisabled()"
    (input)="onInput($event)"
    (blur)="onTouched()"
  ></textarea>

  @if (error()) {
    <p class="field__error">{{ error() }}</p>
  }
</div>
